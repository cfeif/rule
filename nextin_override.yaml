# ── Proxy Groups ──────────────────────────────────────────────────────────────
proxy-groups: #!replace

  # ── Master selector ────────────────────────────────────────────────────────
  # Switch region here; all service groups point to 🚀 Proxy by default.
  # include-all exposes individual nodes below the regional groups for
  # manual selection if needed.
  - name: "🚀 Proxy"
    type: select
    proxies:
      - "🇭🇰 HK"
      - "🇸🇬 SG"
      - "🇯🇵 JP"
      - "🇺🇸 US"
      - "🇹🇼 TW"
      - "🇰🇷 KR"
      - "🇨🇳 CN"
      - "⚡ 自动选择"
      - "♻️ 故障转移"
      - DIRECT

  # ── Regional url-test (auto best-latency within region) ───────────────────
  - name: "🇭🇰 HK"
    type: url-test
    include-all: true
    filter: "香港0[1-5]"
    interval: 300
    lazy: true

  # 香港06-10 — for YouTube to CN
  - name: "🇨🇳 CN"
    type: url-test
    include-all: true
    filter: "香港0[6-9]|香港10"
    interval: 300
    lazy: true

  - name: "🇸🇬 SG"
    type: url-test
    include-all: true
    filter: "新加坡|狮城|SG|Singapore"
    interval: 300
    lazy: true

  - name: "🇯🇵 JP"
    type: url-test
    include-all: true
    filter: "日本|东京|大阪|JP|Japan"
    interval: 300
    lazy: true

  - name: "🇺🇸 US"
    type: url-test
    include-all: true
    filter: "美国|洛杉矶|硅谷|纽约|US|United States|America"
    interval: 300
    lazy: true

  - name: "🇹🇼 TW"
    type: url-test
    include-all: true
    filter: "台湾|臺灣|TW|Taiwan"
    interval: 300
    lazy: true

  - name: "🇰🇷 KR"
    type: url-test
    include-all: true
    filter: "韩国|韓國|KR|Korea"
    interval: 300
    lazy: true

  # ── Resilience groups ──────────────────────────────────────────────────────
  # fallback: health-checks all nodes, uses first available in list order
  - name: "♻️ 故障转移"
    type: fallback
    include-all: true
    interval: 300
    lazy: true

  # url-test across all nodes: pure lowest-latency, ignores region
  - name: "⚡ 自动选择"
    type: url-test
    include-all: true
    interval: 300
    lazy: true

  # - name: "🎯 手动选择"
  #   type: select
  #   include-all: true
  #   interval: 300
  #   lazy: true

  # ── Service groups ─────────────────────────────────────────────────────────

  - name: "🤖 AI"
    type: select
    proxies:
      - "🇺🇸 US"
      - "🇸🇬 SG"
      - "🇯🇵 JP"
      - "🚀 Proxy"
      - DIRECT

  - name: "📺 流媒体"
    type: select
    proxies:
      - "🇸🇬 SG"
      - "🇯🇵 JP"
      - "🇺🇸 US"
      - "🇭🇰 HK"
      - "🚀 Proxy"
      - DIRECT

  - name: "▶️ YouTube"
    type: select
    proxies:
      - "🇨🇳 CN"
      - "🚀 Proxy"

  - name: "🍎 苹果"
    type: select
    proxies:
      - DIRECT
      - "🚀 Proxy"
      - "🇺🇸 US"
      - "🇭🇰 HK"

  - name: "🛑 广告"
    type: select
    proxies:
      - REJECT
      - DIRECT

  - name: "🐟 Final"
    type: select
    proxies:
      - "🚀 Proxy"
      - DIRECT
      - REJECT

