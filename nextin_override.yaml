rules: #!replace

  # LAN
  - GEOIP,LAN,DIRECT,no-resolve

  # Ads
  - RULE-SET,ads,🛑 广告

  # Apple exceptions
  - DOMAIN-SUFFIX,podcasts.apple.com,🚀 Proxy
  - DOMAIN-SUFFIX,podcastsservices.apple.com,🚀 Proxy
  - DOMAIN-SUFFIX,bookkeeper.itunes.apple.com,🚀 Proxy
  - RULE-SET,apple,🍎 苹果

  # Streaming
  - RULE-SET,youtube,▶️ YouTube
  - RULE-SET,netflix,📺 流媒体
  - RULE-SET,disney,📺 流媒体
  - RULE-SET,hbo,📺 流媒体
  - RULE-SET,primevideo,📺 流媒体

  # AI
  - RULE-SET,openai,🤖 AI
  - RULE-SET,claude,🤖 AI
  - RULE-SET,google,🤖 AI

  # CN traffic
  - GEOIP,CN,DIRECT,no-resolve

  # Final
  - MATCH,🐟 Final